name: CI

on:
  push:
    branches:
      - main
      - feature/preview
  pull_request:
    branches:
      - main
      - feature/preview

env:
  NEXT_PUBLIC_SITE_URL: https://fuwhis.io.vn

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:check

      - name: Prettier
        run: pnpm prettier:check

      - name: Build
        run: pnpm build
